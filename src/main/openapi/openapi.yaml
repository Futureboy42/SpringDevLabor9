openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /api2/documents:
    post:
      tags:
        - document-controller
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            'application.json':
              schema:
                $ref: "#/components/schemas/CreateDocumentResponse"
  /api2/documents/{id}/download:
    get:
      tags:
        - document-controller
      operationId: download
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                format: byte
components:
  schemas:
    CreateDocumentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        contentType:
          type: string
        content:
          type: string
          format: byte
        contentBase64:
          type: string
          format: byte
    CreateDocumentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
